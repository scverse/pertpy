name: Release Drafter
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize

permissions: {}

jobs:
    update_release_draft:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - uses: release-drafter/release-drafter@09c613e259eb8d4e7c81c2cb00618eb5fc4575a7 # v5
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
