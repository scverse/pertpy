name: Release Drafter
on:
    push:
        branches:
            - main
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize

permissions: {}

jobs:
    update_release_draft:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: read
        steps:
            - uses: release-drafter/release-drafter@4d75298e00d9e34c483e5ff8c68d0ea1c1940c1e # v7.5.1
              env:
                  GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
